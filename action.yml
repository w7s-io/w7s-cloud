name: W7S Deploy
description: Deploy the current repository archive to W7S.

inputs:
  deploy-url:
    description: W7S deploy endpoint.
    required: false
    default: https://w7s.cloud/api/v1/deploy
  token:
    description: GitHub token used for W7S deploy authorization. Defaults to github.token.
    required: false
    default: ""
  environment:
    description: Optional W7S environment override.
    required: false
    default: ""
  install-command:
    description: Optional install command to run before deployment.
    required: false
    default: ""
  build-command:
    description: Optional build command to run before deployment.
    required: false
    default: ""
  vars:
    description: Optional comma-separated environment variable names to pass as plain-text Worker bindings. Names declared in w7s.json are included automatically.
    required: false
    default: ""
  secrets:
    description: Optional comma-separated environment variable names to pass as secret Worker bindings. Names declared in w7s.json are included automatically.
    required: false
    default: ""
  working-directory:
    description: Directory to package and deploy.
    required: false
    default: .
  usage-warnings-issue:
    description: "Open or update a GitHub issue when W7S reports usage warnings or suspension state. Requires issues: write."
    required: false
    default: "true"
  usage-check-only:
    description: Read W7S usage, Cloudflare-synced metrics, and suspension state without packaging or deploying the repository.
    required: false
    default: "false"
  logs-check-only:
    description: Read recent W7S user Worker logs without packaging or deploying the repository.
    required: false
    default: "false"
  logs-hours:
    description: Number of trailing hours of logs to fetch.
    required: false
    default: "1"
  logs-limit:
    description: Maximum number of log records to fetch.
    required: false
    default: "50"
  logs-kind:
    description: Optional log kind filter. Supported values are console, exception, and outcome.
    required: false
    default: ""
  logs-level:
    description: Optional console log level filter. Supported values are debug, info, log, warn, and error.
    required: false
    default: ""
  telegram-chat-id:
    description: Optional Telegram chat id to link to this repo for deployment notifications and future repo alerts.
    required: false
    default: ""
  telegram-user-id:
    description: Optional alias for telegram-chat-id. Private Telegram user ids can be used after the user starts the W7S bot.
    required: false
    default: ""
  telegram-events:
    description: Optional comma-separated Telegram notification events for this repo.
    required: false
    default: "deploy_success,deploy_warning,deploy_error,app_suspended,payment_request"
  telegram-bot-token:
    description: Optional Telegram bot token. When set with telegram-chat-id, the action sends and edits live deployment status messages directly through that bot.
    required: false
    default: ""
  telegram-thread-id:
    description: Optional Telegram message thread id for forum topics when telegram-bot-token is set.
    required: false
    default: ""
  telegram-message-id:
    description: Optional Telegram message id to edit when telegram-bot-token is set. Use the telegram-message-id output from an earlier notification step.
    required: false
    default: ""
  telegram-notify-only:
    description: Send or update the Telegram deployment status message without installing, building, deploying, checking usage, or fetching logs.
    required: false
    default: "false"
  telegram-status-stage:
    description: Status stage to send when telegram-notify-only is true. Supported values include start, package, upload, success, warning, and error.
    required: false
    default: "start"

outputs:
  logs-count:
    description: Number of log records returned when logs-check-only is true.
    value: ${{ steps.logs.outputs['logs-count'] }}
  logs-url:
    description: W7S logs API URL used when logs-check-only is true.
    value: ${{ steps.logs.outputs['logs-url'] }}
  telegram-message-id:
    description: Telegram message id created or updated by direct Telegram notifications.
    value: ${{ steps.deploy.outputs['telegram-message-id'] || steps.telegram-notify.outputs['telegram-message-id'] }}

runs:
  using: composite
  steps:
    - name: Telegram notify
      id: telegram-notify
      if: ${{ inputs.telegram-notify-only == 'true' }}
      shell: bash
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_TELEGRAM_CHAT_ID: ${{ inputs.telegram-chat-id }}
        INPUT_TELEGRAM_USER_ID: ${{ inputs.telegram-user-id }}
        INPUT_TELEGRAM_EVENTS: ${{ inputs.telegram-events }}
        INPUT_TELEGRAM_BOT_TOKEN: ${{ inputs.telegram-bot-token }}
        INPUT_TELEGRAM_THREAD_ID: ${{ inputs.telegram-thread-id }}
        INPUT_TELEGRAM_MESSAGE_ID: ${{ inputs.telegram-message-id }}
        INPUT_TELEGRAM_STATUS_STAGE: ${{ inputs.telegram-status-stage }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
        GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        GITHUB_WORKFLOW_VALUE: ${{ github.workflow }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        deploy_url="$INPUT_DEPLOY_URL"
        if [ -n "$INPUT_ENVIRONMENT" ]; then
          if [[ "$deploy_url" == *"?"* ]]; then
            deploy_url="${deploy_url}&environment=${INPUT_ENVIRONMENT}"
          else
            deploy_url="${deploy_url}?environment=${INPUT_ENVIRONMENT}"
          fi
        fi

        response_body="$RUNNER_TEMP/w7s-deploy-response.json"
        telegram_message_id="$RUNNER_TEMP/w7s-telegram-message-id"
        rm -f "$response_body" "$telegram_message_id"
        if [ -n "$INPUT_TELEGRAM_MESSAGE_ID" ]; then
          printf "%s" "$INPUT_TELEGRAM_MESSAGE_ID" > "$telegram_message_id"
        fi

        telegram_chat_id="${INPUT_TELEGRAM_CHAT_ID:-$INPUT_TELEGRAM_USER_ID}"
        telegram_direct_required="true"
        W7S_DEPLOY_TOKEN="$deploy_token" \
        W7S_TELEGRAM_CHAT_ID="$telegram_chat_id" \
        W7S_TELEGRAM_EVENTS="$INPUT_TELEGRAM_EVENTS" \
        W7S_TELEGRAM_BOT_TOKEN="$INPUT_TELEGRAM_BOT_TOKEN" \
        W7S_TELEGRAM_THREAD_ID="$INPUT_TELEGRAM_THREAD_ID" \
        W7S_TELEGRAM_MESSAGE_ID_PATH="$telegram_message_id" \
        W7S_TELEGRAM_DIRECT_REQUIRED="$telegram_direct_required" \
        W7S_DEPLOY_ENVIRONMENT="$INPUT_ENVIRONMENT" \
          node "$GITHUB_ACTION_PATH/scripts/notify-deploy-status.cjs" "$INPUT_TELEGRAM_STATUS_STAGE" "$deploy_url" "$response_body" "" || true

        if [ -f "$telegram_message_id" ]; then
          echo "telegram-message-id=$(cat "$telegram_message_id")" >> "$GITHUB_OUTPUT"
        fi

    - name: Install
      if: ${{ inputs.install-command != '' && inputs.usage-check-only != 'true' && inputs.logs-check-only != 'true' && inputs.telegram-notify-only != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_INSTALL_COMMAND: ${{ inputs.install-command }}
      run: |
        set -euo pipefail
        eval "$W7S_INSTALL_COMMAND"

    - name: Build
      if: ${{ inputs.build-command != '' && inputs.usage-check-only != 'true' && inputs.logs-check-only != 'true' && inputs.telegram-notify-only != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -euo pipefail
        eval "$W7S_BUILD_COMMAND"

    - name: Deploy
      id: deploy
      if: ${{ inputs.usage-check-only != 'true' && inputs.logs-check-only != 'true' && inputs.telegram-notify-only != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_VARS: ${{ inputs.vars }}
        INPUT_SECRETS: ${{ inputs.secrets }}
        INPUT_TELEGRAM_CHAT_ID: ${{ inputs.telegram-chat-id }}
        INPUT_TELEGRAM_USER_ID: ${{ inputs.telegram-user-id }}
        INPUT_TELEGRAM_EVENTS: ${{ inputs.telegram-events }}
        INPUT_TELEGRAM_BOT_TOKEN: ${{ inputs.telegram-bot-token }}
        INPUT_TELEGRAM_THREAD_ID: ${{ inputs.telegram-thread-id }}
        INPUT_TELEGRAM_MESSAGE_ID: ${{ inputs.telegram-message-id }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
        GITHUB_API_URL_VALUE: ${{ github.api_url }}
        GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        GITHUB_WORKFLOW_VALUE: ${{ github.workflow }}
        GITHUB_ACTION_TOKEN: ${{ github.token }}
        INPUT_USAGE_WARNINGS_ISSUE: ${{ inputs.usage-warnings-issue }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S deploy requires a GitHub token." >&2
          exit 1
        fi

        deploy_url="$INPUT_DEPLOY_URL"
        if [ -n "$INPUT_ENVIRONMENT" ]; then
          if [[ "$deploy_url" == *"?"* ]]; then
            deploy_url="${deploy_url}&environment=${INPUT_ENVIRONMENT}"
          else
            deploy_url="${deploy_url}?environment=${INPUT_ENVIRONMENT}"
          fi
        fi

        archive_path="$RUNNER_TEMP/w7s-deploy.zip"
        response_body="$RUNNER_TEMP/w7s-deploy-response.json"
        metadata_dir="$RUNNER_TEMP/w7s-deploy-metadata"
        telegram_message_id="$RUNNER_TEMP/w7s-telegram-message-id"
        rm -f "$archive_path" "$response_body"
        rm -f "$telegram_message_id"
        rm -rf "$metadata_dir"
        if [ -n "$INPUT_TELEGRAM_MESSAGE_ID" ]; then
          printf "%s" "$INPUT_TELEGRAM_MESSAGE_ID" > "$telegram_message_id"
        fi

        telegram_chat_id="${INPUT_TELEGRAM_CHAT_ID:-$INPUT_TELEGRAM_USER_ID}"
        telegram_direct_required="false"
        if [ -n "$INPUT_TELEGRAM_BOT_TOKEN" ] || [ -n "$INPUT_TELEGRAM_MESSAGE_ID" ]; then
          telegram_direct_required="true"
        fi
        write_telegram_output() {
          if [ -f "$telegram_message_id" ]; then
            echo "telegram-message-id=$(cat "$telegram_message_id")" >> "$GITHUB_OUTPUT"
          fi
        }
        notify_deploy_status() {
          local stage="$1"
          local status="${2:-}"
          W7S_DEPLOY_TOKEN="$deploy_token" \
          W7S_TELEGRAM_CHAT_ID="$telegram_chat_id" \
          W7S_TELEGRAM_EVENTS="$INPUT_TELEGRAM_EVENTS" \
          W7S_TELEGRAM_BOT_TOKEN="$INPUT_TELEGRAM_BOT_TOKEN" \
          W7S_TELEGRAM_THREAD_ID="$INPUT_TELEGRAM_THREAD_ID" \
          W7S_TELEGRAM_MESSAGE_ID_PATH="$telegram_message_id" \
          W7S_TELEGRAM_DIRECT_REQUIRED="$telegram_direct_required" \
          W7S_DEPLOY_ENVIRONMENT="$INPUT_ENVIRONMENT" \
            node "$GITHUB_ACTION_PATH/scripts/notify-deploy-status.cjs" "$stage" "$deploy_url" "$response_body" "$status" || true
        }

        deploy_completed="false"
        on_deploy_exit() {
          local exit_code="$?"
          if [ "$deploy_completed" != "true" ] && [ "$exit_code" -ne 0 ]; then
            notify_deploy_status error ""
            write_telegram_output
          fi
        }
        trap on_deploy_exit EXIT

        notify_deploy_status start ""

        node "$GITHUB_ACTION_PATH/scripts/write-deploy-metadata.cjs" "$PWD" "$metadata_dir"
        vars_header="$(cat "$metadata_dir/vars.b64")"
        secrets_header="$(cat "$metadata_dir/secrets.b64")"

        if [ ! -f CNAME ] && [ -n "${GITHUB_WORKSPACE:-}" ] && [ -f "$GITHUB_WORKSPACE/CNAME" ]; then
          cp "$GITHUB_WORKSPACE/CNAME" CNAME
          echo "Copied repo-root CNAME into the deploy directory."
        fi

        notify_deploy_status package ""
        zip -qr "$archive_path" . \
          -x ".git/*" \
          -x "node_modules/*" \
          -x "*/node_modules/*" \
          -x "*/*/node_modules/*" \
          -x ".wrangler/*" \
          -x "*/.wrangler/*" \
          -x "*/*/.wrangler/*" \
          -x "dist/.vite/*"

        curl_headers=(
          -H "Authorization: Bearer ${deploy_token}"
          -H "x-github-repository: ${GITHUB_REPOSITORY_NAME}"
          -H "x-github-branch: ${GITHUB_REF_NAME_VALUE}"
          -H "x-github-sha: ${GITHUB_SHA_VALUE}"
          -H "content-type: application/zip"
        )
        if [ -n "$vars_header" ]; then
          curl_headers+=(-H "x-w7s-vars: ${vars_header}")
        fi
        if [ -n "$secrets_header" ]; then
          curl_headers+=(-H "x-w7s-secrets: ${secrets_header}")
        fi
        if [ -n "$telegram_chat_id" ]; then
          curl_headers+=(-H "x-w7s-telegram-chat-id: ${telegram_chat_id}")
          if [ -n "$INPUT_TELEGRAM_EVENTS" ]; then
            curl_headers+=(-H "x-w7s-telegram-events: ${INPUT_TELEGRAM_EVENTS}")
          fi
        fi

        notify_deploy_status upload ""
        http_status="$(curl -sS -o "$response_body" -w "%{http_code}" \
          -X POST "$deploy_url" \
          "${curl_headers[@]}" \
          --data-binary "@${archive_path}")"

        if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ] && node -e 'try{const fs=require("node:fs");const p=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.exit(p?.status==="success"?0:1)}catch{process.exit(1)}' "$response_body"; then
          if node -e 'try{const fs=require("node:fs");const p=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));const d=p?.data||{};const count=(v)=>Array.isArray(v)?v.length:0;process.exit(count(d.deploymentWarnings)+count(d.customDomainWarnings)+count(d.blockedCustomDomains)>0?0:1)}catch{process.exit(1)}' "$response_body"; then
            notify_deploy_status warning "$http_status"
          else
            notify_deploy_status success "$http_status"
          fi
        else
          notify_deploy_status error "$http_status"
        fi
        write_telegram_output
        deploy_completed="true"
        trap - EXIT

        node "$GITHUB_ACTION_PATH/scripts/format-deploy-response.cjs" "$response_body" "$http_status"
        W7S_DEPLOY_TOKEN="$deploy_token" W7S_GITHUB_TOKEN="$GITHUB_ACTION_TOKEN" node "$GITHUB_ACTION_PATH/scripts/write-usage-summary.cjs" "$response_body" "$deploy_url"

    - name: Check usage
      if: ${{ inputs.usage-check-only == 'true' && inputs.telegram-notify-only != 'true' }}
      shell: bash
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
        GITHUB_API_URL_VALUE: ${{ github.api_url }}
        GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        GITHUB_WORKFLOW_VALUE: ${{ github.workflow }}
        GITHUB_ACTION_TOKEN: ${{ github.token }}
        INPUT_USAGE_WARNINGS_ISSUE: ${{ inputs.usage-warnings-issue }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S usage check requires a GitHub token." >&2
          exit 1
        fi

        W7S_USAGE_CHECK_ONLY="true" \
        W7S_USAGE_REPOSITORY="$GITHUB_REPOSITORY_NAME" \
        W7S_USAGE_ENVIRONMENT="$INPUT_ENVIRONMENT" \
        W7S_USAGE_BRANCH="$GITHUB_REF_NAME_VALUE" \
        W7S_USAGE_COMMIT_SHA="$GITHUB_SHA_VALUE" \
        W7S_DEPLOY_TOKEN="$deploy_token" \
        W7S_GITHUB_TOKEN="$GITHUB_ACTION_TOKEN" \
          node "$GITHUB_ACTION_PATH/scripts/write-usage-summary.cjs" "" "$INPUT_DEPLOY_URL"

    - name: Fetch logs
      id: logs
      if: ${{ inputs.logs-check-only == 'true' && inputs.telegram-notify-only != 'true' }}
      shell: bash
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_LOGS_HOURS: ${{ inputs.logs-hours }}
        INPUT_LOGS_LIMIT: ${{ inputs.logs-limit }}
        INPUT_LOGS_KIND: ${{ inputs.logs-kind }}
        INPUT_LOGS_LEVEL: ${{ inputs.logs-level }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S logs check requires a GitHub token." >&2
          exit 1
        fi

        W7S_DEPLOY_TOKEN="$deploy_token" \
        W7S_LOGS_REPOSITORY="$GITHUB_REPOSITORY_NAME" \
        W7S_LOGS_ENVIRONMENT="$INPUT_ENVIRONMENT" \
        W7S_LOGS_BRANCH="$GITHUB_REF_NAME_VALUE" \
        W7S_LOGS_HOURS="$INPUT_LOGS_HOURS" \
        W7S_LOGS_LIMIT="$INPUT_LOGS_LIMIT" \
        W7S_LOGS_KIND="$INPUT_LOGS_KIND" \
        W7S_LOGS_LEVEL="$INPUT_LOGS_LEVEL" \
          node "$GITHUB_ACTION_PATH/scripts/write-logs-summary.cjs" "$INPUT_DEPLOY_URL"
