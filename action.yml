name: W7S Deploy
description: Deploy the current repository archive to W7S.

inputs:
  deploy-url:
    description: W7S deploy endpoint.
    required: false
    default: https://w7s.cloud/api/v1/deploy
  token:
    description: GitHub token used for W7S deploy authorization. Defaults to github.token.
    required: false
    default: ""
  environment:
    description: Optional W7S environment override.
    required: false
    default: ""
  install-command:
    description: Optional install command to run before deployment.
    required: false
    default: ""
  build-command:
    description: Optional build command to run before deployment.
    required: false
    default: ""
  working-directory:
    description: Directory to package and deploy.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Install
      if: ${{ inputs.install-command != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_INSTALL_COMMAND: ${{ inputs.install-command }}
      run: |
        set -euo pipefail
        eval "$W7S_INSTALL_COMMAND"

    - name: Build
      if: ${{ inputs.build-command != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -euo pipefail
        eval "$W7S_BUILD_COMMAND"

    - name: Deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S deploy requires a GitHub token." >&2
          exit 1
        fi

        deploy_url="$INPUT_DEPLOY_URL"
        if [ -n "$INPUT_ENVIRONMENT" ]; then
          if [[ "$deploy_url" == *"?"* ]]; then
            deploy_url="${deploy_url}&environment=${INPUT_ENVIRONMENT}"
          else
            deploy_url="${deploy_url}?environment=${INPUT_ENVIRONMENT}"
          fi
        fi

        archive_path="$RUNNER_TEMP/w7s-deploy.zip"
        response_body="$RUNNER_TEMP/w7s-deploy-response.json"
        rm -f "$archive_path" "$response_body"
        zip -qr "$archive_path" . \
          -x ".git/*" \
          -x "node_modules/*" \
          -x ".wrangler/*" \
          -x "dist/.vite/*"

        http_status="$(curl -sS -o "$response_body" -w "%{http_code}" \
          -X POST "$deploy_url" \
          -H "Authorization: Bearer ${deploy_token}" \
          -H "x-github-repository: ${GITHUB_REPOSITORY_NAME}" \
          -H "x-github-branch: ${GITHUB_REF_NAME_VALUE}" \
          -H "x-github-sha: ${GITHUB_SHA_VALUE}" \
          -H "content-type: application/zip" \
          --data-binary "@${archive_path}")"

        node "$GITHUB_ACTION_PATH/scripts/format-deploy-response.cjs" "$response_body" "$http_status"
