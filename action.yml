name: W7S Deploy
description: Deploy the current repository archive to W7S.

inputs:
  deploy-url:
    description: W7S deploy endpoint.
    required: false
    default: https://w7s.cloud/api/v1/deploy
  token:
    description: GitHub token used for W7S deploy authorization. Defaults to github.token.
    required: false
    default: ""
  environment:
    description: Optional W7S environment override.
    required: false
    default: ""
  install-command:
    description: Optional install command to run before deployment.
    required: false
    default: ""
  build-command:
    description: Optional build command to run before deployment.
    required: false
    default: ""
  vars:
    description: Optional comma-separated environment variable names to pass as plain-text Worker bindings. Names declared in w7s.json are included automatically.
    required: false
    default: ""
  secrets:
    description: Optional comma-separated environment variable names to pass as secret Worker bindings. Names declared in w7s.json are included automatically.
    required: false
    default: ""
  working-directory:
    description: Directory to package and deploy.
    required: false
    default: .
  usage-warnings-issue:
    description: "Open or update a GitHub issue when W7S reports usage warnings or suspension state. Requires issues: write."
    required: false
    default: "true"
  usage-check-only:
    description: Read W7S usage, Cloudflare-synced metrics, and suspension state without packaging or deploying the repository.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install
      if: ${{ inputs.install-command != '' && inputs.usage-check-only != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_INSTALL_COMMAND: ${{ inputs.install-command }}
      run: |
        set -euo pipefail
        eval "$W7S_INSTALL_COMMAND"

    - name: Build
      if: ${{ inputs.build-command != '' && inputs.usage-check-only != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -euo pipefail
        eval "$W7S_BUILD_COMMAND"

    - name: Deploy
      if: ${{ inputs.usage-check-only != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_VARS: ${{ inputs.vars }}
        INPUT_SECRETS: ${{ inputs.secrets }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
        GITHUB_API_URL_VALUE: ${{ github.api_url }}
        GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        GITHUB_WORKFLOW_VALUE: ${{ github.workflow }}
        GITHUB_ACTION_TOKEN: ${{ github.token }}
        INPUT_USAGE_WARNINGS_ISSUE: ${{ inputs.usage-warnings-issue }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S deploy requires a GitHub token." >&2
          exit 1
        fi

        deploy_url="$INPUT_DEPLOY_URL"
        if [ -n "$INPUT_ENVIRONMENT" ]; then
          if [[ "$deploy_url" == *"?"* ]]; then
            deploy_url="${deploy_url}&environment=${INPUT_ENVIRONMENT}"
          else
            deploy_url="${deploy_url}?environment=${INPUT_ENVIRONMENT}"
          fi
        fi

        archive_path="$RUNNER_TEMP/w7s-deploy.zip"
        response_body="$RUNNER_TEMP/w7s-deploy-response.json"
        metadata_dir="$RUNNER_TEMP/w7s-deploy-metadata"
        rm -f "$archive_path" "$response_body"
        rm -rf "$metadata_dir"

        node "$GITHUB_ACTION_PATH/scripts/write-deploy-metadata.cjs" "$PWD" "$metadata_dir"
        vars_header="$(cat "$metadata_dir/vars.b64")"
        secrets_header="$(cat "$metadata_dir/secrets.b64")"

        if [ ! -f CNAME ] && [ -n "${GITHUB_WORKSPACE:-}" ] && [ -f "$GITHUB_WORKSPACE/CNAME" ]; then
          cp "$GITHUB_WORKSPACE/CNAME" CNAME
          echo "Copied repo-root CNAME into the deploy directory."
        fi

        zip -qr "$archive_path" . \
          -x ".git/*" \
          -x "node_modules/*" \
          -x ".wrangler/*" \
          -x "dist/.vite/*"

        curl_headers=(
          -H "Authorization: Bearer ${deploy_token}"
          -H "x-github-repository: ${GITHUB_REPOSITORY_NAME}"
          -H "x-github-branch: ${GITHUB_REF_NAME_VALUE}"
          -H "x-github-sha: ${GITHUB_SHA_VALUE}"
          -H "content-type: application/zip"
        )
        if [ -n "$vars_header" ]; then
          curl_headers+=(-H "x-w7s-vars: ${vars_header}")
        fi
        if [ -n "$secrets_header" ]; then
          curl_headers+=(-H "x-w7s-secrets: ${secrets_header}")
        fi

        http_status="$(curl -sS -o "$response_body" -w "%{http_code}" \
          -X POST "$deploy_url" \
          "${curl_headers[@]}" \
          --data-binary "@${archive_path}")"

        node "$GITHUB_ACTION_PATH/scripts/format-deploy-response.cjs" "$response_body" "$http_status"
        W7S_DEPLOY_TOKEN="$deploy_token" W7S_GITHUB_TOKEN="$GITHUB_ACTION_TOKEN" node "$GITHUB_ACTION_PATH/scripts/write-usage-summary.cjs" "$response_body" "$deploy_url"

    - name: Check usage
      if: ${{ inputs.usage-check-only == 'true' }}
      shell: bash
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
        GITHUB_API_URL_VALUE: ${{ github.api_url }}
        GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        GITHUB_WORKFLOW_VALUE: ${{ github.workflow }}
        GITHUB_ACTION_TOKEN: ${{ github.token }}
        INPUT_USAGE_WARNINGS_ISSUE: ${{ inputs.usage-warnings-issue }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S usage check requires a GitHub token." >&2
          exit 1
        fi

        W7S_USAGE_CHECK_ONLY="true" \
        W7S_USAGE_REPOSITORY="$GITHUB_REPOSITORY_NAME" \
        W7S_USAGE_ENVIRONMENT="$INPUT_ENVIRONMENT" \
        W7S_USAGE_BRANCH="$GITHUB_REF_NAME_VALUE" \
        W7S_USAGE_COMMIT_SHA="$GITHUB_SHA_VALUE" \
        W7S_DEPLOY_TOKEN="$deploy_token" \
        W7S_GITHUB_TOKEN="$GITHUB_ACTION_TOKEN" \
          node "$GITHUB_ACTION_PATH/scripts/write-usage-summary.cjs" "" "$INPUT_DEPLOY_URL"
