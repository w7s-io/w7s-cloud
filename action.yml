name: W7S Deploy
description: Deploy the current repository archive to W7S.

inputs:
  deploy-url:
    description: W7S deploy endpoint.
    required: false
    default: https://w7s.cloud/api/v1/deploy
  token:
    description: GitHub token used for W7S deploy authorization. Defaults to github.token.
    required: false
    default: ""
  environment:
    description: Optional W7S environment override.
    required: false
    default: ""
  install-command:
    description: Optional install command to run before deployment.
    required: false
    default: ""
  build-command:
    description: Optional build command to run before deployment.
    required: false
    default: ""
  working-directory:
    description: Directory to package and deploy.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Install
      if: ${{ inputs.install-command != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_INSTALL_COMMAND: ${{ inputs.install-command }}
      run: |
        set -euo pipefail
        eval "$W7S_INSTALL_COMMAND"

    - name: Build
      if: ${{ inputs.build-command != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        W7S_BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -euo pipefail
        eval "$W7S_BUILD_COMMAND"

    - name: Deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_DEPLOY_URL: ${{ inputs.deploy-url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        GITHUB_SHA_VALUE: ${{ github.sha }}
      run: |
        set -euo pipefail

        deploy_token="${INPUT_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
        if [ -z "$deploy_token" ]; then
          echo "W7S deploy requires a GitHub token." >&2
          exit 1
        fi

        deploy_url="$INPUT_DEPLOY_URL"
        if [ -n "$INPUT_ENVIRONMENT" ]; then
          if [[ "$deploy_url" == *"?"* ]]; then
            deploy_url="${deploy_url}&environment=${INPUT_ENVIRONMENT}"
          else
            deploy_url="${deploy_url}?environment=${INPUT_ENVIRONMENT}"
          fi
        fi

        archive_path="$RUNNER_TEMP/w7s-deploy.zip"
        response_body="$RUNNER_TEMP/w7s-deploy-response.json"
        rm -f "$archive_path" "$response_body"
        zip -qr "$archive_path" . \
          -x ".git/*" \
          -x "node_modules/*" \
          -x ".wrangler/*" \
          -x "dist/.vite/*"

        http_status="$(curl -sS -o "$response_body" -w "%{http_code}" \
          -X POST "$deploy_url" \
          -H "Authorization: Bearer ${deploy_token}" \
          -H "x-github-repository: ${GITHUB_REPOSITORY_NAME}" \
          -H "x-github-branch: ${GITHUB_REF_NAME_VALUE}" \
          -H "x-github-sha: ${GITHUB_SHA_VALUE}" \
          -H "content-type: application/zip" \
          --data-binary "@${archive_path}")"

        echo "W7S deploy HTTP status: ${http_status}"
        cat "$response_body"

        node - "$response_body" "$http_status" >> "$GITHUB_STEP_SUMMARY" <<'NODE'
        const fs = require("node:fs");
        const [, , responsePath, httpStatus] = process.argv;
        const raw = fs.readFileSync(responsePath, "utf8");
        let payload = null;
        try {
          payload = JSON.parse(raw);
        } catch {}

        const asArray = (value) => Array.isArray(value) ? value : [];
        const workflowEscape = (value) => String(value ?? "")
          .replaceAll("%", "%25")
          .replaceAll("\r", "%0D")
          .replaceAll("\n", "%0A");
        const code = (value) => `\`${String(value ?? "n/a")}\``;

        const lines = [
          "### W7S Deploy",
          "",
          `- HTTP status: \`${httpStatus}\``,
        ];

        if (payload && typeof payload === "object") {
          lines.push(`- W7S status: \`${payload.status ?? "unknown"}\``);
          const deployment = payload.data?.deployment;
          if (deployment) {
            lines.push(`- Repository: \`${deployment.repository ?? "n/a"}\``);
            lines.push(`- Environment: \`${deployment.environment ?? "n/a"}\``);
            lines.push(`- Worker entrypoint: \`${deployment.targets?.worker?.entrypoint ?? "n/a"}\``);
            lines.push(`- Static files: \`${deployment.targets?.static?.fileCount ?? 0}\``);
          }
          if (payload.data?.url) {
            lines.push(`- URL: ${payload.data.url}`);
          }
          const customDomains = asArray(payload.data?.customDomains);
          if (customDomains.length > 0) {
            lines.push(`- Custom domains: ${customDomains.map(code).join(", ")}`);
          }

          const customDomainWarnings = asArray(payload.data?.customDomainWarnings);
          if (customDomainWarnings.length > 0) {
            lines.push("", "#### ⚠️ CNAME TXT Security Warning", "");
            lines.push("These custom domains were attached, but domain ownership is not locked yet. Add the recommended TXT record to prevent another repo from moving the hostname later.");
            lines.push("");
            for (const warning of customDomainWarnings) {
              const hostname = warning.hostname ?? "custom domain";
              const txtName = warning.txtName ?? "_w7s.<domain>";
              const txtValue = warning.txtValue ?? deployment?.repository ?? "owner/repo";
              lines.push(`- ${code(hostname)}: add TXT ${code(txtName)} with value ${code(txtValue)}`);
              console.error(`::warning title=CNAME TXT Security::${workflowEscape(`${hostname} is attached without TXT ownership protection. Add TXT ${txtName}=${txtValue}.`)}`);
            }
          }

          const blockedCustomDomains = asArray(payload.data?.blockedCustomDomains);
          if (blockedCustomDomains.length > 0) {
            lines.push("", "#### ⚠️ Blocked Custom Domains", "");
            lines.push("The app deployed, but these hostnames were not attached. Add the listed TXT record or remove the conflicting claim, then deploy again.");
            lines.push("");
            for (const blocked of blockedCustomDomains) {
              const hostname = blocked.hostname ?? "custom domain";
              const txtName = blocked.txtName ?? "_w7s.<domain>";
              const txtValue = blocked.txtValue ?? deployment?.repository ?? "owner/repo";
              const reason = blocked.reason ?? "blocked";
              lines.push(`- ${code(hostname)} (${code(reason)}): add TXT ${code(txtName)} with value ${code(txtValue)}`);
              if (blocked.currentRepository) lines.push(`  Current repository: ${code(blocked.currentRepository)}`);
              console.error(`::warning title=Blocked custom domain::${workflowEscape(`${hostname} was not attached. Add TXT ${txtName}=${txtValue}.`)}`);
            }
          }

          if (payload.error || payload.message) {
            lines.push(`- Error: \`${payload.error ?? payload.message}\``);
          }
        } else {
          lines.push("- Response: invalid JSON");
        }

        lines.push("", "<details><summary>Raw response</summary>", "", "```json", raw, "```", "</details>");
        process.stdout.write(lines.join("\n"));

        if (!(Number(httpStatus) >= 200 && Number(httpStatus) < 300)) process.exit(1);
        if (!payload || payload.status !== "success") process.exit(1);
        NODE
