name: Tag v1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Move v1 tag
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move v1 tag to main
        run: |
          git config user.name "W7S"
          git config user.email "git@w7s.io"
          git tag --force v1 "$GITHUB_SHA"
          git push --force origin refs/tags/v1
