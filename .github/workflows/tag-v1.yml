name: Tag v1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Move v1 tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Move v1 tag to main
        run: |
          set -euo pipefail

          git config user.name "W7S"
          git config user.email "git@w7s.io"
          git tag -f v1 "${GITHUB_SHA}"
          git push origin refs/tags/v1 --force
