name: Tag v1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Move v1 tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Move v1 tag to main
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v1
        run: |
          set -euo pipefail

          ref="tags/${TAG_NAME}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/${ref}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/${ref}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true >/dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/${ref}" \
              -f sha="${GITHUB_SHA}" >/dev/null
          fi
